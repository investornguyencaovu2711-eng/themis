<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <title>Thông tin giao dịch</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: none;
      }

      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        background-color: #ffffff;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 24px;
        position: relative;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      .phone-container::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      .header {
        padding: 24px 20px 16px 20px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #f1f5f9;
        background-color: #ffffff;
        position: sticky;
        top: 0;
        z-index: 10;
        justify-content: center;
        -webkit-user-select: none;
        user-select: none;
        flex-shrink: 0;
      }
      .header-title {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }

      .content {
        padding: 24px 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .success-icon {
        width: 64px;
        height: 64px;
        background-color: #d1fae5;
        color: #059669;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        margin: 0 auto 16px auto;
        -webkit-user-select: none;
        user-select: none;
      }
      .status-text {
        font-size: 18px;
        color: #059669;
        font-weight: 700;
        margin-bottom: 24px;
        text-align: center;
        -webkit-user-select: none;
        user-select: none;
      }

      .qr-container {
        display: none;
        flex-direction: column;
        align-items: center;
        background: #ffffff;
        padding: 20px;
        border-radius: 20px;
        border: 2px dashed #cbd5e1;
        margin-bottom: 24px;
        width: 100%;
      }
      .qr-image {
        width: 220px;
        height: 220px;
        object-fit: contain;
        margin-bottom: 16px;
        border-radius: 8px;
      }

      .btn-download-qr {
        background-color: #f1f5f9;
        color: #334155;
        border: 1px solid #cbd5e1;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        min-height: 44px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        -webkit-user-select: none;
        user-select: none;
        transition: background-color 0.15s;
      }
      .btn-download-qr:active {
        background-color: #e2e8f0;
      }

      .notice-box {
        font-size: 13px;
        color: #b45309;
        line-height: 1.5;
        background-color: #fef3c7;
        border: 1px solid #fde68a;
        padding: 14px;
        border-radius: 12px;
        width: 100%;
        margin-bottom: 24px;
        text-align: center;
        -webkit-user-select: text;
        user-select: text;
      }

      .info-card {
        width: 100%;
        background-color: #f8fafc;
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #e2e8f0;
        margin-bottom: 24px;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 14px;
        font-size: 14px;
        align-items: flex-start;
      }
      .info-row:last-child {
        margin-bottom: 0;
      }
      .info-label {
        color: #64748b;
        flex: 1;
        -webkit-user-select: none;
        user-select: none;
      }
      .info-value,
      .highlight-amount {
        font-weight: 600;
        color: #1e293b;
        text-align: right;
        flex: 1.5;
        word-break: break-word;
        -webkit-user-select: text;
        user-select: text; /* Cho phép copy tài khoản/số tiền */
      }
      .highlight-amount {
        color: #2563eb;
        font-size: 18px;
        font-weight: 800;
      }

      .btn-group {
        width: 100%;
        margin-top: auto;
        padding-bottom: 20px;
      }
      .btn-home {
        width: 100%;
        min-height: 52px;
        padding: 14px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
        text-align: center;
        display: block;
        text-decoration: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .btn-home:active {
        transform: scale(0.98);
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="header center">
        <div class="header-title">Kết quả giao dịch</div>
      </div>

      <div class="content">
        <div class="success-icon">✓</div>
        <div class="status-text">Giao dịch đã được ghi nhận</div>

        <div class="qr-container" id="qrBlock">
          <img src="" alt="Mã QR Chuyển khoản" class="qr-image" id="imgQR" />
          <button type="button" class="btn-download-qr" id="btnDownloadQR">
            📥 Tải mã QR về máy
          </button>
        </div>

        <div class="notice-box" id="lblNotice">Đang tải thông báo...</div>

        <div class="info-card">
          <div class="info-row">
            <span class="info-label">Tài khoản (Email):</span>
            <span class="info-value" id="lblEmail">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Loại giao dịch:</span>
            <span class="info-value" id="lblAction" style="font-weight: 700"
              >-</span
            >
          </div>
          <div class="info-row">
            <span class="info-label">Số lượng CCQ:</span>
            <span class="info-value" id="lblCCQ" style="color: #ed8936"
              >0.00 CCQ</span
            >
          </div>
          <div class="info-row">
            <span class="info-label">Ngân hàng:</span>
            <span class="info-value" id="lblBank">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">Số tài khoản:</span>
            <span
              class="info-value"
              id="lblAccount"
              style="letter-spacing: 0.5px"
              >-</span
            >
          </div>
          <div
            class="info-row"
            style="
              border-top: 1px dashed #cbd5e1;
              padding-top: 14px;
              margin-top: 14px;
            "
          >
            <span class="info-label" style="font-weight: 700; color: #1e293b"
              >Số tiền:</span
            >
            <span class="info-value highlight-amount" id="lblAmount"
              >0 VND</span
            >
          </div>
          <div class="info-row">
            <span class="info-label">Nội dung chuyển khoản:</span>
            <span
              class="info-value"
              id="lblContent"
              style="color: #dc2626; font-family: monospace; font-size: 15px"
              >-</span
            >
          </div>
        </div>

        <div class="btn-group">
          <a href="trangchu.html" class="btn-home">Về Trang Chủ</a>
        </div>
      </div>
    </div>

    <script>
      let globalQRUrl = "";

      function parseTransactionInfo() {
        const urlParams = new URLSearchParams(window.location.search);

        const email = urlParams.get("email") || "Không rõ";
        const action = urlParams.get("action") || "Giao dịch CCQ";
        const bank = urlParams.get("bank") || "";
        const account = urlParams.get("account") || "";
        const amountRaw = parseInt(urlParams.get("amount")) || 0;
        const content = urlParams.get("content") || "";
        const ccqRaw = parseFloat(urlParams.get("ccq")) || 0;

        document.getElementById("lblEmail").innerText = email;
        document.getElementById("lblAction").innerText = action;
        document.getElementById("lblCCQ").innerText =
          ccqRaw.toFixed(2) + " CCQ";
        document.getElementById("lblBank").innerText = bank.toUpperCase();
        document.getElementById("lblAccount").innerText = account;
        document.getElementById("lblAmount").innerText =
          amountRaw.toLocaleString("en-US") + " VND";
        document.getElementById("lblContent").innerText = content;

        const noticeElement = document.getElementById("lblNotice");
        const qrBlock = document.getElementById("qrBlock");

        if (action.includes("Nộp")) {
          qrBlock.style.display = "flex";
          globalQRUrl = `https://qr.sepay.vn/img?bank=${bank}&acc=${account}&template=qronly&amount=${amountRaw}&des=${encodeURIComponent(content)}`;
          document.getElementById("imgQR").src = globalQRUrl;
          noticeElement.innerHTML = `<strong>Hướng dẫn nộp tiền:</strong> Quét mã QR phía trên hoặc chuyển khoản thủ công đúng <strong>${amountRaw.toLocaleString("en-US")} VND</strong> vào tài khoản <strong>${account}</strong> (${bank.toUpperCase()}) kèm nội dung <strong>${content}</strong>.`;
        } else {
          qrBlock.style.display = "none";
          noticeElement.innerHTML = `<strong>Thông báo rút tiền:</strong> Lệnh bán <strong>${ccqRaw.toFixed(2)} CCQ</strong> đang chờ xử lý. Hệ thống sẽ thanh toán tiền về số tài khoản ngân hàng của bạn trong vòng 24h làm việc.`;
        }
      }

      document
        .getElementById("btnDownloadQR")
        .addEventListener("click", async function () {
          if (!globalQRUrl) return;
          try {
            const response = await fetch(globalQRUrl);
            const blob = await response.blob();

            const downloadLink = document.createElement("a");
            downloadLink.href = URL.createObjectURL(blob);
            downloadLink.download = "Ma_QR_Chuyen_Khoan.png";

            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
          } catch (error) {
            console.error("Không thể tải mã QR trực tiếp:", error);
            window.open(globalQRUrl, "_blank");
          }
        });

      document.addEventListener("DOMContentLoaded", parseTransactionInfo);
    </script>
  </body>
</html>
