<form onsubmit="handleRegister(event)">
  <input type="text" id="reg_user" placeholder="Tên đăng nhập" required />
  <input type="email" id="reg_email" placeholder="Email" required />
  <input type="text" id="reg_HovaTen" placeholder="Họ và tên" required />
  <input
    type="text"
    id="reg_SoDienThoai"
    placeholder="Số điện thoại"
    required
  />
  <input type="password" id="reg_pass" placeholder="Mật khẩu" required />
  <button type="submit">Đăng ký qua API</button>
</form>

<script>
  async function handleRegister(event) {
    event.preventDefault(); // Ngăn trang web tải lại

    const userData = {
      username: document.getElementById("reg_user").value,
      email: document.getElementById("reg_email").value,
      HovaTen: document.getElementById("reg_HovaTen").value,
      SoDienThoai: document.getElementById("reg_SoDienThoai").value,
      password: document.getElementById("reg_pass").value,
    };

    try {
      const response = await fetch(
        "https://quintet-rickety-scuba.ngrok-free.dev/register",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(userData),
        },
      );

      const result = await response.json();
      alert(result.message); // Hiển thị thông báo từ Python trả về
    } catch (error) {
      console.error("Lỗi kết nối API:", error);
      alert("Không thể kết nối đến Server Python!");
    }
  }
</script>

<div class="form-container">
  <h2>Đăng Nhập</h2>
  <form id="loginForm">
    <input
      type="text"
      id="login_user"
      placeholder="Tên đăng nhập hoặc Email"
      required
    />
    <input type="password" id="login_pass" placeholder="Mật khẩu" required />
    <button type="submit">Đăng Nhập</button>
  </form>
</div>

<script>
  // Xử lý Đăng Nhập
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault(); // Chặn việc load lại trang

    const loginData = {
      username: document.getElementById("login_user").value,
      password: document.getElementById("login_pass").value,
    };

    try {
      const response = await fetch(
        "https://quintet-rickety-scuba.ngrok-free.dev/login",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(loginData),
        },
      );

      const result = await response.json();

      if (response.ok) {
        // chuyển hướng trang tại đây:
        // Lấy email từ kết quả API trả về (giả sử server trả về { "email": "abc@gmail.com" })
        const userToken = result.Token;

        // Chuyển hướng và đính kèm Token vào URL
        window.location.href = `transaction_system.html?Token=${encodeURIComponent(userToken)}`;
      } else {
        alert(result.message);
      }
    } catch (error) {
      alert("Lỗi: Không thể kết nối tới Server!");
    }
  });
</script>

<div class="form-container">
  <a href="#" id="toggleForgot">Quên mật khẩu?</a>

  <div
    id="forgotPasswordArea"
    style="
      display: none;
      margin-top: 15px;
      border-top: 1px solid #ddd;
      padding-top: 15px;
    "
  >
    <h3>Khôi phục mật khẩu</h3>

    <div id="step1">
      <input
        type="email"
        id="reset_email"
        placeholder="Nhập Email đã đăng ký"
        required
      />
      <button onclick="sendOTP()" id="btnSend">Gửi mã OTP</button>
    </div>

    <div id="step2" style="display: none">
      <p style="font-size: 13px; color: #666">
        Mã OTP đã được gửi đến email của bạn.
      </p>
      <input
        type="text"
        id="otp_code"
        placeholder="Nhập mã OTP 6 số"
        required
      />
      <input
        type="password"
        id="new_password"
        placeholder="Mật khẩu mới"
        required
      />
      <button onclick="verifyAndReset()" style="background-color: #28a745">
        Xác nhận đổi mật khẩu
      </button>
    </div>
  </div>
</div>

<script>
  // Dán toàn bộ đoạn JavaScript xử lý OTP vào đây
  // Hiện form quên mật khẩu khi nhấn link
  document.getElementById("toggleForgot").onclick = function () {
    const area = document.getElementById("forgotPasswordArea");
    area.style.display = area.style.display === "none" ? "block" : "none";
  };

  // Bước 1: Gọi API gửi OTP
  async function sendOTP() {
    const email = document.getElementById("reset_email").value;
    if (!email) return alert("Vui lòng nhập email!");

    const btn = document.getElementById("btnSend");
    btn.innerText = "Đang gửi...";
    btn.disabled = true;

    try {
      const response = await fetch(
        "https://quintet-rickety-scuba.ngrok-free.dev/send-otp",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email }),
        },
      );

      const result = await response.json();
      if (response.ok) {
        alert(result.message);
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
      } else {
        alert(result.message);
        btn.innerText = "Gửi lại mã OTP";
        btn.disabled = false;
      }
    } catch (error) {
      alert("Lỗi kết nối Server!");
      btn.disabled = false;
    }
  }

  // Bước 2: Gọi API xác thực và đổi mật khẩu
  async function verifyAndReset() {
    const data = {
      email: document.getElementById("reset_email").value,
      otp: document.getElementById("otp_code").value,
      new_password: document.getElementById("new_password").value,
    };

    try {
      const response = await fetch(
        "https://quintet-rickety-scuba.ngrok-free.dev/verify-and-reset",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        },
      );

      const result = await response.json();
      alert(result.message);

      if (response.ok) {
        location.reload(); // Đổi thành công thì tải lại trang để đăng nhập
      }
    } catch (error) {
      alert("Lỗi kết nối!");
    }
  }
  // ...
</script>
