<!doctype html>

    <title>Tiêu đề trang web của bạn</title>
    <style>
      /* Đảm bảo tất cả iframe không vượt quá chiều rộng màn hình */
      iframe {
        max-width: 100%;
        border: none;
      }

      /* Container cho các iframe đơn lẻ */
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
        padding: 0 15px; /* Khoảng cách lề cho di động */
      }

      /* Xử lý phần 2 biểu đồ nằm cạnh nhau */
      .chart-group {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
        gap: 20px;
        margin: 50px auto;
        max-width: 1200px;
        border: 2px solid black;
        padding: 10px;
      }

      /* Ẩn vạch kẻ dọc khi ở màn hình điện thoại vì lúc này 2 biểu đồ sẽ xếp chồng lên nhau */
      .divider {
        width: 2px;
        height: 400px;
        background-color: black;
      }

      @media (max-width: 768px) {
        .divider {
          display: none;
        }
        h1 {
          font-size: 1.5rem;
          text-align: center;
        }
      }
    </style>
  </head>
