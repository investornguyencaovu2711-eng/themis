<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiêu đề trang web của bạn</title>
    <style>
      /* Đảm bảo tất cả iframe không vượt quá chiều rộng màn hình */
      iframe {
        max-width: 100%;
        border: none;
      }

      /* Container cho các iframe đơn lẻ */
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
        padding: 0 15px; /* Khoảng cách lề cho di động */
      }

      /* Xử lý phần 2 biểu đồ nằm cạnh nhau */
      .chart-group {
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
        gap: 20px;
        margin: 50px auto;
        max-width: 1200px;
        border: 2px solid black;
        padding: 10px;
      }

      /* Ẩn vạch kẻ dọc khi ở màn hình điện thoại vì lúc này 2 biểu đồ sẽ xếp chồng lên nhau */
      .divider {
        width: 2px;
        height: 400px;
        background-color: black;
      }

      @media (max-width: 768px) {
        .divider {
          display: none;
        }
        h1 {
          font-size: 1.5rem;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
<body>
    <div class="container">
      <h1>Chào mừng đến với website của quỹ</h1>
    </div>

    <p style="text-align: center;">Chào mừng đến với website của tôi</p>

    <!-- Khối 1 -->
    <div class="container">
      <iframe src="thongtintongthecuaquy.html" width="800" height="195"></iframe>
    </div>

    <!-- Khối 2 -->
    <div class="container">
      <iframe src="capnhatbieudotuggsheet.html" width="1000" height="600"></iframe>
    </div>

    <!-- Khối 3 -->
    <div class="container">
      <iframe src="BieuDoLoiNhuan.html" width="1000" height="600"></iframe>
    </div>

    <!-- Khối 4: Hai biểu đồ song song -->
    <div class="chart-group">
      <iframe
        width="554"
        height="383"
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkbAYUzyMQ7GGKptQYfIgQ6Yd5SZpAEtTcdzK3Rg23eCo3TysYOMfLefO14hY8rZq0uD59OOBCieZj/pubchart?oid=501348753&amp;format=interactive"
      ></iframe>
      
      <div class="divider"></div>
      
      <iframe
        width="554"
        height="383"
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQkbAYUzyMQ7GGKptQYfIgQ6Yd5SZpAEtTcdzK3Rg23eCo3TysYOMfLefO14hY8rZq0uD59OOBCieZj/pubchart?oid=1368898948&amp;format=interactive"
      ></iframe>
    </div>
</body>
</html>
