<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>trang chủ</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html {
        /* Prevent font scaling on orientation change */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh; /* Dynamic viewport height for mobile */
        overscroll-behavior: auto;
      }

      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        background-color: #ffffff;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 24px;
        position: relative;
        /* Smooth momentum scrolling on iOS */
        -webkit-overflow-scrolling: touch;
        /*overscroll-behavior-y: contain;*/
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
          /* Respect iOS safe areas */
          padding-top: env(safe-area-inset-top);
        }
      }

      /* ── Header ── */
      .user-header {
        padding: 24px 20px 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        background-color: #ffffff;
        /* Prevent layout shift on scroll */
        flex-shrink: 0;
      }

      .user-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0; /* Allow text truncation */
      }

      .welcome-text {
        font-size: 24px;
        color: #718096;
        font-weight: 500;
        line-height: 1.2;
      }

      .HoTen {
        font-size: 20px;
        font-weight: 700;
        color: #1a202c;
        word-break: break-word;
        margin-left: 20px;
        line-height: 1.3;
      }

      /* ── Header actions ── */
      .header-actions {
        display: flex;
        gap: 10px;
        position: relative;
        flex-shrink: 0;
      }

      .notification-box,
      .menu-box {
        width: 44px; /* Min 44px touch target (Apple HIG) */
        height: 44px;
        background-color: #f1f5f9;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: background-color 0.15s ease;
        /* Better touch feedback */
        -webkit-user-select: none;
        user-select: none;
      }

      .notification-box:hover,
      .menu-box:hover,
      .notification-box:active,
      .menu-box:active {
        background-color: #e2e8f0;
      }

      .bell-icon,
      .menu-icon {
        font-size: 18px;
        line-height: 1;
      }

      /* ── Dropdown ── */
      .dropdown-menu {
        display: none;
        position: absolute;
        top: 48px;
        right: 0;
        background-color: #ffffff;
        min-width: 160px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        z-index: 1000;
        overflow: hidden;
        border: 1px solid #e2e8f0;
      }

      .dropdown-menu.show {
        display: block;
        animation: fadeIn 0.15s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .dropdown-item {
        /* Min 44px height for touch */
        min-height: 44px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #1a202c;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: background-color 0.15s ease;
        -webkit-user-select: none;
        user-select: none;
      }

      .dropdown-item:active {
        background-color: #f1f5f9;
      }

      @media (hover: hover) {
        .dropdown-item:hover {
          background-color: #f8fafc;
        }
      }

      /* ── Content ── */
      .content {
        padding: 0 16px 24px 16px;
        flex: 1;
      }

      /* ── Card ── */
      .card {
        background: linear-gradient(
          135deg,
          #1d4ed8 0%,
          #2563eb 50%,
          #0284c7 100%
        );
        border-radius: 20px;
        padding: 20px;
        color: white;
        position: relative;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.15);
        /* GPU compositing */
        will-change: transform;
        transform: translateZ(0);
      }

      .tag-profit {
        position: absolute;
        top: 16px;
        right: 16px;
        background-color: #22c55e;
        font-size: 12px;
        font-weight: 600;
        padding: 10px 10px; /* Slightly bigger touch area */
        border-radius: 20px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        transition: opacity 0.15s ease;
        z-index: 10;
      }

      .tag-profit:active {
        opacity: 0.8;
      }

      .card .balance-val {
        font-size: clamp(20px, 6vw, 26px); /* Fluid font size */
        font-weight: 800;
        margin-top: 2px;
        margin-bottom: 16px;
        letter-spacing: -0.02em;
        /* Prevent text overflow on small screens */
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        padding-top: 12px;
        font-size: 12px;
        gap: 8px;
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        justify-content: center;
        gap: 80px;
        margin: 20px 0;
      }

      .action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        /* Min touch target */
        min-width: 60px;
        padding: 4px;
        -webkit-user-select: none;
        user-select: none;
        border-radius: 12px;
        transition: opacity 0.15s ease;
      }

      .action-btn:active {
        opacity: 0.7;
      }

      .circle {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #ebf5ff;
        color: #1a56db;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
        transition: background-color 0.15s ease;
      }

      .action-btn:active .circle {
        background-color: #dbeafe;
      }

      /* ── Bottom Nav ── */
      .bottom-nav {
        height: 60px;
        /* Add safe area for iPhone home indicator */
        padding-bottom: env(safe-area-inset-bottom);
        border-top: 1px solid #e2e8f0;
        background: white;
        display: flex;
        justify-content: space-around;
        align-items: center;
        position: sticky;
        bottom: 0;
        flex-shrink: 0;
        /* Prevent nav from going behind iOS home indicator */
        min-height: calc(60px + env(safe-area-inset-bottom));
      }

      .nav-item {
        font-size: 11px;
        color: #94a3b8;
        cursor: pointer;
        text-align: center;
        /* Min touch target */
        min-width: 64px;
        min-height: 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2px;
        padding: 4px 8px;
        border-radius: 8px;
        transition: opacity 0.15s ease;
        -webkit-user-select: none;
        user-select: none;
      }

      .nav-item:active {
        opacity: 0.7;
      }

      .nav-item.active {
        color: #1a56db;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="user-header">
        <div class="user-info">
          <div class="welcome-text">Xin chào,</div>
          <div class="HoTen" id="lblHoVaTen">đang tải...</div>
        </div>

        <div class="header-actions">
          <div class="notification-box">
            <span class="bell-icon">🔔</span>
          </div>
          <div class="menu-box" id="btnToggleMenu">
            <span class="menu-icon">☰</span>
          </div>

          <div class="dropdown-menu" id="dropdownMenu">
            <a
              href="https://quintet-rickety-scuba.ngrok-free.dev/dashboardquy"
              class="dropdown-item"
            >
              <span>📊</span> Dashboard
            </a>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="card">
          <a
            class="tag-profit"
            onclick="window.location.href = 'investment.html'"
          >
            Chi tiết
          </a>
          <div style="font-size: 12px; opacity: 0.85; margin-top: 12px">
            Giá trị tài sản ròng
          </div>

          <div class="balance-val" id="lblNetAsset">0 VND</div>

          <div class="footer">
            <div>
              <div style="opacity: 0.8">Thông tin tài khoản:</div>
              <div style="font-weight: 700" id="lblCardSoTK"></div>
            </div>
            <div
              style="
                background: rgba(255, 255, 255, 0.2);
                padding: 2px 8px;
                border-radius: 4px;
                font-weight: 700;
                white-space: nowrap;
              "
              id="lblCardBank"
            ></div>
          </div>
        </div>

        <div class="actions">
          <div
            class="action-btn"
            onclick="window.location.href = 'transaction.html?action=rut'"
          >
            <div class="circle">－</div>
            <span style="font-size: 12px">Rút tiền</span>
          </div>
          <div
            class="action-btn"
            onclick="window.location.href = 'transaction.html?action=nap'"
          >
            <div class="circle">＋</div>
            <span style="font-size: 12px">Nạp tiền</span>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item active" id="btnNavHome">
          <div>⚖️</div>
          Trang chủ
        </div>
        <div
          class="nav-item"
          id="btnNavHistory"
          onclick="window.location.href = 'history.html'"
        >
          <div>⌛</div>
          Lịch sử
        </div>
        <div
          class="nav-item"
          id="btnLogout"
          style="color: #dc2626; font-weight: bold"
        >
          <div>🚪</div>
          Thoát
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";

      async function loadProfile() {
        try {
          const res = await fetch(`${API_BASE_URL}/profile`, {
            method: "GET",
            credentials: "include",
            headers: { "ngrok-skip-browser-warning": "69420" },
          });
          if (!res.ok) {
            alert(
              "Tài khoản đang xác thực hoặc lỗi đăng nhập. Hãy quay lại sau!",
            );
            window.location.href = "login.html";
            return;
          }
          const data = await res.json();
          const info = data.user_information;

          document.getElementById("lblHoVaTen").innerText = data.HoVaTen;
          document.getElementById("lblNetAsset").innerText =
            info["Giá trị tài sản ròng"];
          document.getElementById("lblCardSoTK").innerText =
            info["Số tài khoản"];
          document.getElementById("lblCardBank").innerText =
            info["Ngân hàng"].toUpperCase();
        } catch (err) {
          console.error(err);
          window.location.href = "login.html";
        }
      }

      document
        .getElementById("btnLogout")
        .addEventListener("click", async () => {
          await fetch(`${API_BASE_URL}/logout`, {
            method: "POST",
            credentials: "include",
          });
          window.location.href = "login.html";
        });

      const btnToggleMenu = document.getElementById("btnToggleMenu");
      const dropdownMenu = document.getElementById("dropdownMenu");

      btnToggleMenu.addEventListener("click", (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle("show");
      });

      document.addEventListener("click", () => {
        if (dropdownMenu.classList.contains("show")) {
          dropdownMenu.classList.remove("show");
        }
      });

      document.addEventListener("DOMContentLoaded", loadProfile);
    </script>
  </body>
</html>
