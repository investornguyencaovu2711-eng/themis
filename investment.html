<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin đầu tư</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        /* Ngăn font phóng to tự động trên iOS khi xoay màn hình */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100dvh; /* dvh: hỗ trợ tốt hơn vh trên mobile (tránh bị che bởi thanh địa chỉ) */
      }

      .phone-container {
        width: 100%;
        max-width: 430px;
        min-height: 100dvh;
        background-color: #ffffff;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        border-radius: 24px;
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          box-shadow: none;
        }
      }

      /* ── Header ── */
      .back-header {
        display: flex;
        align-items: center;
        gap: 8px;
        /* padding-top dùng safe-area để tránh notch/Dynamic Island trên iOS */
        padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 12px;
        background-color: #ffffff;
        border-bottom: 1px solid #f1f5f9;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .back-btn {
        /* Vùng tap tối thiểu 44×44 px theo Apple HIG */
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        font-size: 22px;
        font-weight: 700;
        color: #1a56db;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }

      .page-title {
        font-size: 17px;
        font-weight: 700;
        color: #1e293b;
        letter-spacing: -0.2px;
      }

      /* ── Nội dung ── */
      .content {
        padding: 16px 16px calc(env(safe-area-inset-bottom, 0px) + 24px);
        flex: 1;
      }

      .invest-box {
        background-color: #f8fafc;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        padding: 4px 16px;
        margin-top: 8px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 0;
        border-bottom: 1px solid #f1f5f9;
      }

      .row:last-child {
        border-bottom: none;
      }

      .row-lbl {
        font-size: 14px;
        font-weight: 600;
        color: #475569;
        line-height: 1.4;
      }

      .row-sub {
        font-size: 12px;
        color: #64748b;
        margin-top: 2px;
        line-height: 1.3;
      }

      .row-val {
        font-size: 14px;
        font-weight: 700;
        color: #1e293b;
        text-align: right;
        line-height: 1.4;
        /* Không bị vỡ sang dòng mới khi giá trị dài */
        white-space: nowrap;
      }

      /* ── Màu lợi nhuận (gán bằng JS) ── */
      .profit-positive {
        color: #10b981;
      }

      .profit-negative {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="back-header">
        <span class="back-btn" onclick="window.location.href = 'trangchu.html'"
          >🔙</span
        >
        <span class="page-title">Chi tiết đầu tư</span>
      </div>

      <div class="content">
        <div class="invest-box">
          <div class="row">
            <div>
              <div class="row-lbl">Tổng giá trị</div>
              <div class="row-sub" id="lblSubVon">Vốn: đang tải...</div>
            </div>
            <div class="row-val" id="lblInvestVal">đang tải...</div>
          </div>
          <div class="row">
            <div>
              <div class="row-lbl">Lợi nhuận</div>
              <div class="row-sub">Hiệu suất danh mục</div>
            </div>
            <div style="text-align: right">
              <div class="row-val" id="lblProfit">+0 VND</div>
              <div class="row-val" style="font-size: 12px" id="lblRate">
                (0%)
              </div>
            </div>
          </div>
          <div class="row">
            <div>
              <div class="row-lbl">Chứng chỉ quỹ sở hữu</div>
              <div class="row-sub" id="lblNavPrice">Giá CCQ: đang tải...</div>
            </div>
            <div class="row-val" id="lblCcqCount">0.00</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";
      async function loadInvestmentData() {
        try {
          const res = await fetch(`${API_BASE_URL}/profile`, {
            method: "GET",
            credentials: "include",
            headers: { "ngrok-skip-browser-warning": "69420" },
          });
          if (!res.ok) {
            try {
              const errData = await res.json();
              // Lấy thông tin lỗi từ key "error" mà Python trả về
              alert(errData.error || "Có lỗi xảy ra, vui lòng đăng nhập lại!");
            } catch (e) {
              // Phòng trường hợp server trả về lỗi nhưng không dạng JSON
              alert("Lỗi hệ thống. Vui lòng thử lại sau!");
            }
            window.location.href = "login.html";
            return;
          }
          const data = await res.json();
          const info = data.user_information;

          // Cập nhật các thông tin dữ liệu API lên trang mới
          document.getElementById("lblInvestVal").innerText =
            info["Giá trị tài sản ròng"];
          document.getElementById("lblSubVon").innerText =
            "Vốn: " + info["Tổng vốn"];
          const profitText = info["Biên độ lãi"] ?? "";
          const profitEl = document.getElementById("lblProfit");
          const rateEl = document.getElementById("lblRate");

          profitEl.innerText = profitText;
          rateEl.innerText = "(" + info["Hiệu suất"] + ")";

          // Xác định lãi/lỗ dựa theo ký tự đầu tiên của chuỗi
          const isNegative = profitText.trim().startsWith("-");
          const colorClass = isNegative ? "profit-negative" : "profit-positive";
          profitEl.classList.add(colorClass);
          rateEl.classList.add(colorClass);
          document.getElementById("lblCcqCount").innerText =
            info["Chứng chỉ quỹ nắm giữ (CCQ)"];
          document.getElementById("lblNavPrice").innerText =
            "Giá CCQ: " + data.GiaCCQ;
        } catch (err) {
          console.error(err);
          window.location.href = "login.html";
        }
      }

      document.addEventListener("DOMContentLoaded", loadInvestmentData);
    </script>
  </body>
</html>
