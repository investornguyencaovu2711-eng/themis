<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi API Message</title>
    <style>
        body { font-family: sans-serif; margin: 50px; line-height: 1.6; }
        .container { max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #response { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 4px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gửi thông điệp</h2>
    <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." value="hello world">
    <button onclick="sendMessage()">Gửi POST Request</button>

    <div id="response">Kết quả sẽ hiển thị ở đây...</div>
</div>

<script>
    async function sendMessage() {
        const url = "https://quintet-rickety-scuba.ngrok-free.dev/api/message";
        const message = document.getElementById('messageInput').value;
        const responseDiv = document.getElementById('response');

        responseDiv.innerText = "Đang gửi...";

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message
                })
            });

            const data = await response.json();
            responseDiv.innerText = JSON.stringify(data, null, 2);
        } catch (error) {
            responseDiv.innerText = "Lỗi: " + error.message;
            console.error("Error:", error);
        }
    }
</script>

</body>
</html>
