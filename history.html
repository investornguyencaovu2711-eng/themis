<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Lịch sử giao dịch</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: none;
      }

      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        background-color: #ffffff;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-radius: 24px;
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
          padding-top: env(safe-area-inset-top);
        }
      }

      /* ── Header ── */
      .page-header {
        padding: 24px 20px 12px 20px;
        background-color: #ffffff;
        border-bottom: 1px solid #f1f5f9;
        flex-shrink: 0;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
        line-height: 1.2;
      }

      /* ── Content ── */
      .content {
        padding: 0 16px 16px 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0; /* Critical: allows flex children to shrink below content size */
      }

      .sec-title {
        font-size: 14px;
        font-weight: 700;
        color: #2d3748;
        margin: 16px 0 10px 4px;
        flex-shrink: 0;
      }

      /* ── Transaction boxes ── */
      .tx-box {
        background: #fff;
        border-radius: 14px;
        border: 1px solid #e2e8f0;
        padding: 4px 12px;
        /* Flex-based equal height distribution */
        flex: 1;
        min-height: 80px;
        max-height: 240px;
        overflow-y: auto;
        overflow-x: hidden;
        /* Smooth iOS scrolling */
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        /* Prevent layout thrash */
        will-change: scroll-position;
      }

      /* Slim scrollbar */
      .tx-box::-webkit-scrollbar {
        width: 3px;
      }
      .tx-box::-webkit-scrollbar-track {
        background: transparent;
      }
      .tx-box::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 4px;
      }

      /* ── Transaction items ── */
      .tx-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px dashed #e2e8f0;
        gap: 8px;
      }

      .tx-item:last-child {
        border-bottom: none;
      }

      .tx-left {
        min-width: 0; /* Allow text truncation */
        flex: 1;
      }

      .tx-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tx-date {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 2px;
        line-height: 1.3;
      }

      .tx-right {
        text-align: right;
        flex-shrink: 0;
      }

      .tx-amount {
        font-weight: 700;
        font-size: 13px;
        line-height: 1.3;
      }

      .status {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #def7ec;
        color: #03543f;
        font-weight: 600;
        display: inline-block;
        margin-top: 4px;
        line-height: 1.4;
        white-space: nowrap;
      }

      .status-pending {
        background: #fef3c7;
        color: #92400e;
      }

      .status-cancel {
        background: #fde8e8;
        color: #9b1c1c;
      }

      .empty-tx {
        font-size: 13px;
        color: #94a3b8;
        text-align: center;
        padding: 16px 0;
        line-height: 1.5;
      }

      /* ── Bottom Nav ── */
      .bottom-nav {
        height: 60px;
        padding-bottom: env(safe-area-inset-bottom);
        min-height: calc(60px + env(safe-area-inset-bottom));
        border-top: 1px solid #e2e8f0;
        background: white;
        display: flex;
        justify-content: space-around;
        align-items: center;
        flex-shrink: 0;
      }

      .nav-item {
        font-size: 11px;
        color: #94a3b8;
        cursor: pointer;
        text-align: center;
        min-width: 64px;
        min-height: 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2px;
        padding: 4px 8px;
        border-radius: 8px;
        transition: opacity 0.15s ease;
        -webkit-user-select: none;
        user-select: none;
      }

      .nav-item:active {
        opacity: 0.7;
      }

      .nav-item.active {
        color: #1a56db;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="page-header">
        <span class="page-title">Lịch sử giao dịch</span>
      </div>

      <div class="content">
        <h3 class="sec-title">Giao dịch đang xử lý</h3>
        <div class="tx-box" id="txPendingBox">
          <div class="empty-tx">Không có giao dịch nào đang xử lý</div>
        </div>

        <h3 class="sec-title">Giao dịch thành công</h3>
        <div class="tx-box" id="txSuccessBox">
          <div class="empty-tx">Không có giao dịch thành công nào</div>
        </div>
      </div>

      <div class="bottom-nav">
        <div
          class="nav-item"
          id="btnNavHome"
          onclick="window.location.href = 'trangchu.html'"
        >
          <div>⚖️</div>
          Trang chủ
        </div>
        <div class="nav-item active" id="btnNavHistory">
          <div>⌛</div>
          Lịch sử
        </div>
        <div
          class="nav-item"
          id="btnLogout"
          style="color: #dc2626; font-weight: bold"
        >
          <div>🚪</div>
          Thoát
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";

      async function loadHistoryData() {
        try {
          const res = await fetch(`${API_BASE_URL}/profile`, {
            method: "GET",
            credentials: "include",
            headers: { "ngrok-skip-browser-warning": "69420" },
          });
          if (!res.ok) {
            window.location.href = "login.html";
            return;
          }
          const data = await res.json();

          // Giao dịch đang xử lý
          const txPendingBox = document.getElementById("txPendingBox");
          if (
            data.user_transaction_DangXuLy &&
            data.user_transaction_DangXuLy.length > 0
          ) {
            txPendingBox.innerHTML = "";
            data.user_transaction_DangXuLy.forEach((tx) => {
              const div = document.createElement("div");
              div.className = "tx-item";
              div.innerHTML = `
                <div class="tx-left">
                  <div class="tx-title">${tx["Nop/Rut"]} tiền (${tx["CCQ"]} CCQ)</div>
                  <div class="tx-date">${tx.created_at}</div>
                </div>
                <div class="tx-right">
                  <div class="tx-amount" style="color:#f59e0b;">${tx["Nop/Rut"] === "Nộp" ? "+" : "-"}${tx.tien}</div>
                  <span class="status status-pending">${tx.TrangThaiGiaoDich}</span>
                </div>`;
              txPendingBox.appendChild(div);
            });
          }

          // Giao dịch thành công
          const txSuccessBox = document.getElementById("txSuccessBox");
          if (
            data.user_transaction_success &&
            data.user_transaction_success.length > 0
          ) {
            txSuccessBox.innerHTML = "";
            data.user_transaction_success.forEach((tx) => {
              const isHuy = tx.TrangThaiGiaoDich === "Đã hủy";
              const div = document.createElement("div");
              div.className = "tx-item";
              div.innerHTML = `
                <div class="tx-left">
                  <div class="tx-title">${tx["Nop/Rut"]} tiền (${tx["CCQ"]} CCQ)</div>
                  <div class="tx-date">${tx.created_at}</div>
                </div>
                <div class="tx-right">
                  <div class="tx-amount" style="${isHuy ? "text-decoration:line-through;color:#94a3b8;" : "color:#10b981;"}">${tx["Nop/Rut"] === "Nộp" ? "+" : "-"}${tx.tien}</div>
                  <span class="status ${isHuy ? "status-cancel" : ""}">${tx.TrangThaiGiaoDich}</span>
                </div>`;
              txSuccessBox.appendChild(div);
            });
          }
        } catch (err) {
          console.error(err);
          window.location.href = "login.html";
        }
      }

      document
        .getElementById("btnLogout")
        .addEventListener("click", async () => {
          await fetch(`${API_BASE_URL}/logout`, {
            method: "POST",
            credentials: "include",
          });
          window.location.href = "login.html";
        });

      document.addEventListener("DOMContentLoaded", loadHistoryData);
    </script>
  </body>
</html>
