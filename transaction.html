<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <title>Giao dịch CCQ</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: auto;
      }

      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        background-color: #ffffff;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 24px;
        position: relative;
        -webkit-overflow-scrolling: touch;
        /*overscroll-behavior-y: contain;*/
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      .phone-container::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      .header {
        padding: 24px 20px 16px 20px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #f1f5f9;
        background-color: #ffffff;
        position: sticky;
        top: 0;
        z-index: 10;
        flex-shrink: 0;
        -webkit-user-select: none;
        user-select: none;
      }
      .back-btn {
        font-size: 22px;
        cursor: pointer;
        margin-right: 15px;
        text-decoration: none;
        color: #1a202c;
        padding: 4px;
        border-radius: 8px;
        transition: background-color 0.15s;
      }
      .back-btn:active {
        background-color: #f1f5f9;
      }
      .header-title {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }

      .content {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        -webkit-user-select: none;
        user-select: none;
      }
      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 16px !important;
        font-weight: 600;
        outline: none;
        background-color: #ffffff;
        transition: all 0.2s ease;
        appearance: none;
        -webkit-user-select: text;
        user-select: text;
      }
      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      .input-unit {
        position: absolute;
        right: 16px;
        font-size: 14px;
        font-weight: bold;
        color: #94a3b8;
        pointer-events: none;
        -webkit-user-select: none;
        user-select: none;
      }

      button,
      .btn-submit {
        width: 100%;
        min-height: 52px;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
        -webkit-user-select: none;
        user-select: none;
      }
      button:active {
        transform: scale(0.98);
        opacity: 0.8;
      }
      .btn-nap {
        background-color: #10b981;
      }
      .btn-rut {
        background-color: #ef4444;
      }
      button:disabled {
        opacity: 0.7;
        pointer-events: none;
      }

      .info-box {
        background-color: #f8fafc;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 24px;
        border: 1px solid #e2e8f0;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 14px;
        align-items: center;
      }
      .info-row:last-child {
        margin-bottom: 0;
      }
      .info-label {
        color: #64748b;
        flex: 1;
        -webkit-user-select: none;
        user-select: none;
      }
      .info-value {
        font-weight: 600;
        color: #0f172a;
        text-align: right;
        flex: 1.5;
        word-break: break-word;
      }

      .hint-text {
        font-size: 13px;
        color: #64748b;
        margin-top: 8px;
        line-height: 1.4;
        -webkit-user-select: none;
        user-select: none;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="header">
        <a href="trangchu.html" class="back-btn">🔙</a>
        <div class="header-title" id="txtTitle">Giao dịch</div>
      </div>

      <div class="content">
        <div class="info-box">
          <div class="info-row">
            <span class="info-label">Giá CCQ hiện tại:</span>
            <span class="info-value" id="lblGiaCCQ">đang tải...</span>
          </div>
          <div class="info-row" id="rowKhaDung">
            <span class="info-label" id="lblKhaDungText">Số dư khả dụng:</span>
            <span class="info-value" id="lblKhaDungVal">đang tải...</span>
          </div>
        </div>

        <form id="transactionForm">
          <div class="form-group">
            <label id="lblInputAmount">Số lượng CCQ muốn giao dịch</label>
            <div class="input-wrapper">
              <input
                type="number"
                id="txtCCQ"
                step="0.01"
                min="0.01"
                required
                placeholder="0.00"
              />
              <span class="input-unit">CCQ</span>
            </div>
          </div>

          <div class="form-group">
            <label>Số tiền ước tính quy đổi</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="txtTien"
                readonly
                style="background-color: #f1f5f9; color: #475569"
              />
              <span class="input-unit">VND</span>
            </div>
            <div class="hint-text">
              * Số tiền tự động quy đổi dựa trên công thức: Số lượng CCQ × Giá
              CCQ.
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btnAction">
            Xác nhận
          </button>
        </form>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";
      let giaCCQ = 0;
      let ccqNamGiu = 0;
      let actionType = "nap";
      let thucTeSoTien = 0;

      function initActionType() {
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get("action");
        if (action === "rut") {
          actionType = "rut";
          document.getElementById("txtTitle").innerText = "Rút tiền (Bán CCQ)";
          document.getElementById("lblKhaDungText").innerText =
            "CCQ đang nắm giữ:";
          document.getElementById("lblInputAmount").innerText =
            "Số lượng CCQ muốn BÁN";
          document.getElementById("btnAction").innerText = "Xác nhận RÚT TIỀN";
          document.getElementById("btnAction").classList.add("btn-rut");
          document.querySelector(".hint-text").innerText =
            "Bán CCQ sẽ mất phí 3%";
        } else {
          actionType = "nap";
          document.getElementById("txtTitle").innerText = "Nạp tiền (Mua CCQ)";
          document.getElementById("lblKhaDungText").innerText =
            "Tài sản ròng hiện tại:";
          document.getElementById("lblInputAmount").innerText =
            "Số lượng CCQ muốn MUA";
          document.getElementById("btnAction").innerText = "Xác nhận NẠP TIỀN";
          document.getElementById("btnAction").classList.add("btn-nap");
        }
      }

      async function loadProfileData() {
        try {
          const res = await fetch(`${API_BASE_URL}/profile`, {
            method: "GET",
            credentials: "include",
            headers: { "ngrok-skip-browser-warning": "69420" },
          });
          if (!res.ok) {
            try {
              const errData = await res.json();
              // Lấy thông tin lỗi từ key "error" mà Python trả về
              alert(errData.error || "Có lỗi xảy ra, vui lòng đăng nhập lại!");
            } catch (e) {
              // Phòng trường hợp server trả về lỗi nhưng không dạng JSON
              alert("Lỗi hệ thống. Vui lòng thử lại sau!");
            }
            window.location.href = "login.html";
            return;
          }
          const data = await res.json();

          giaCCQ = parseFloat(data.GiaCCQ);
          document.getElementById("lblGiaCCQ").innerText =
            giaCCQ.toLocaleString("en-US") + " VND / CCQ";

          const info = data.user_information;
          ccqNamGiu = parseFloat(info["Chứng chỉ quỹ nắm giữ (CCQ)"] || 0);

          if (actionType === "rut") {
            document.getElementById("lblKhaDungVal").innerText =
              ccqNamGiu.toFixed(2) + " CCQ";
          } else {
            document.getElementById("lblKhaDungVal").innerText =
              info["Giá trị tài sản ròng"];
          }
        } catch (err) {
          console.error("Lỗi tải thông tin cấu hình:", err);
          alert("Không thể kết nối đến máy chủ.");
        }
      }

      document.getElementById("txtCCQ").addEventListener("input", function () {
        let valueStr = this.value;
        if (valueStr.includes(".")) {
          const parts = valueStr.split(".");
          if (parts[1].length > 2) {
            valueStr = parts[0] + "." + parts[1].slice(0, 2);
            this.value = valueStr;
          }
        }

        const ccqInput = parseFloat(valueStr) || 0;

        if (actionType === "rut") {
          thucTeSoTien = Math.round(ccqInput * giaCCQ * 0.97);
        } else {
          thucTeSoTien = Math.round(ccqInput * giaCCQ);
        }
        document.getElementById("txtTien").value =
          thucTeSoTien.toLocaleString("en-US");
      });

      document
        .getElementById("transactionForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          let ccqValue = parseFloat(document.getElementById("txtCCQ").value);
          ccqValue = Math.round(ccqValue * 100) / 100;

          if (!ccqValue || ccqValue <= 0) {
            alert("Vui lòng nhập số lượng CCQ hợp lệ lớn hơn 0!");
            return;
          }

          if (actionType === "rut" && ccqValue > ccqNamGiu) {
            alert(
              `Bạn không đủ số dư CCQ để thực hiện giao dịch này! Tối đa: ${ccqNamGiu.toFixed(2)} CCQ.`,
            );
            return;
          }

          const maNoiDung =
            Math.floor(100000 + Math.random() * 900000) + String(Date.now());

          const formData = new FormData();
          formData.append("tien", thucTeSoTien);
          formData.append("ccq", ccqValue);
          formData.append("action_type", actionType === "nap" ? "Nộp" : "Rút");
          formData.append("noi_dung", maNoiDung);

          try {
            const res = await fetch(`${API_BASE_URL}/create-transaction`, {
              method: "POST",
              body: formData,
              credentials: "include",
            });

            const resultText = await res.text();

            if (res.status === 200) {
              const profileRes = await fetch(`${API_BASE_URL}/profile`, {
                method: "GET",
                credentials: "include",
                headers: { "ngrok-skip-browser-warning": "69420" },
              });
              const profileData = await profileRes.json();
              const userEmail = profileData.user_information.Email || "";

              let nganHangHienThi = "";
              let soTaiKhoanHienThi = "";

              if (actionType === "rut") {
                nganHangHienThi =
                  profileData.user_information["Ngân hàng"] || "TPBank";
                soTaiKhoanHienThi =
                  profileData.user_information["Số tài khoản"] || "";
              } else {
                nganHangHienThi = "TPBank";
                soTaiKhoanHienThi = "00002716749";
              }

              const params = new URLSearchParams({
                email: userEmail,
                action:
                  actionType === "nap"
                    ? "Nộp tiền (Mua CCQ)"
                    : "Rút tiền (Bán CCQ)",
                bank: nganHangHienThi,
                account: soTaiKhoanHienThi,
                amount: thucTeSoTien,
                content: maNoiDung,
                ccq: ccqValue,
              });

              window.location.href =
                "transactioninfo.html?" + params.toString();
            } else {
              alert("Giao dịch thất bại: " + resultText);
            }
          } catch (error) {
            console.error("Lỗi hệ thống khi tạo lệnh:", error);
            alert("Có lỗi xảy ra trong quá trình gửi lệnh.");
          }
        });

      document.addEventListener("DOMContentLoaded", () => {
        initActionType();
        loadProfileData();
      });
    </script>
  </body>
</html>
