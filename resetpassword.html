<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <title>Khôi phục mật khẩu</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        background:
          linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)),
          url("images/hinhnen.jpg") no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
      }
      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        background-color: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        border-radius: 24px;
        position: relative;
      }
      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
        }
      }
      .wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1;
        padding: 40px 24px;
      }
      h2 {
        font-size: 24px;
        margin-bottom: 24px;
        color: #1a202c;
        font-weight: 700;
        text-align: center;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #718096;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        outline: none;
        background-color: #f8fafc;
        color: #1a202c;
      }
      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background-color: #ffffff;
      }
      .btn {
        width: 100%;
        min-height: 52px;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        background-color: #2563eb;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      }
      .btn:disabled {
        opacity: 0.6;
        pointer-events: none;
      }
      .alert {
        padding: 14px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
        text-align: center;
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #718096;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="wrap">
        <h2>Quên Mật Khẩu</h2>
        <div id="alertBox" class="alert"></div>

        <form id="requestOtpForm">
          <div class="form-group">
            <label>NHẬP EMAIL ĐÃ ĐĂNG KÝ</label>
            <input type="email" id="emailInput" required />
          </div>
          <button type="submit" class="btn" id="btnSendOtp">
            Gửi mã xác nhận
          </button>
        </form>

        <form id="resetPasswordForm" style="display: none">
          <div class="form-group">
            <label>MÃ XÁC THỰC (OTP)</label>
            <input
              type="text"
              id="otpInput"
              required
              placeholder="6 chữ số"
              maxlength="6"
            />
          </div>
          <div class="form-group">
            <label>MẬT KHẨU MỚI</label>
            <input type="password" id="newPasswordInput" required />
          </div>
          <button type="submit" class="btn" id="btnReset">
            Xác nhận đổi mật khẩu
          </button>
        </form>

        <a href="login.html" class="back-link">Quay lại Đăng nhập</a>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";
      const alertBox = document.getElementById("alertBox");
      const requestOtpForm = document.getElementById("requestOtpForm");
      const resetPasswordForm = document.getElementById("resetPasswordForm");
      let savedEmail = "";

      function showAlert(msg, isSuccess = false) {
        alertBox.innerText = msg;
        alertBox.style.display = "block";
        alertBox.style.backgroundColor = isSuccess ? "#dcfce7" : "#fef2f2";
        alertBox.style.color = isSuccess ? "#166534" : "#991b1b";
        alertBox.style.border = isSuccess
          ? "1px solid #bbf7d0"
          : "1px solid #fecaca";
      }

      // Gửi OTP
      requestOtpForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnSendOtp");
        savedEmail = document.getElementById("emailInput").value;

        alertBox.style.display = "none";
        btn.disabled = true;
        btn.innerText = "Đang gửi...";

        try {
          const res = await fetch(`${API_BASE_URL}/send-otp`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "69420",
            },
            body: JSON.stringify({ email: savedEmail }),
          });
          const data = await res.json();

          if (res.ok && data.status === "success") {
            showAlert(data.message, true);
            requestOtpForm.style.display = "none";
            resetPasswordForm.style.display = "block";
          } else {
            showAlert(data.message || "Có lỗi xảy ra!");
          }
        } catch (error) {
          showAlert("Lỗi kết nối máy chủ!");
        } finally {
          btn.disabled = false;
          btn.innerText = "Gửi mã xác nhận";
        }
      });

      // Xác thực OTP và Reset Mật khẩu
      resetPasswordForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnReset");
        const otp = document.getElementById("otpInput").value;
        const new_password = document.getElementById("newPasswordInput").value;

        alertBox.style.display = "none";
        btn.disabled = true;
        btn.innerText = "Đang xử lý...";

        try {
          const res = await fetch(`${API_BASE_URL}/verify-and-reset`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "69420",
            },
            body: JSON.stringify({
              email: savedEmail,
              otp: otp,
              new_password: new_password,
            }),
          });
          const data = await res.json();

          if (res.ok && data.status === "success") {
            showAlert(
              "Đổi mật khẩu thành công! Bạn sẽ được chuyển về trang đăng nhập.",
              true,
            );
            resetPasswordForm.reset();
            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          } else {
            showAlert(data.message || "Có lỗi xảy ra!");
          }
        } catch (error) {
          showAlert("Lỗi kết nối máy chủ!");
        } finally {
          btn.disabled = false;
          btn.innerText = "Xác nhận đổi mật khẩu";
        }
      });
    </script>
  </body>
</html>
