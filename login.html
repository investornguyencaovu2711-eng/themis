<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <title>Đăng nhập</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        /* Giữ lại ảnh nền mờ như cũ */
        background:
          linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)),
          url("images/hinhnen.jpg") no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: auto;
      }

      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        /* Giữ lại hiệu ứng kính mờ (glassmorphism) */
        background-color: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 24px;
        position: relative;
        -webkit-overflow-scrolling: touch;
        /*overscroll-behavior-y: contain;*/
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          background-color: rgba(255, 255, 255, 0.85);
        }
      }

      .phone-container::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      .login-wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1;
        padding: 40px 24px;
      }

      .brand-logo {
        text-align: center;
        margin-bottom: 20px;
      }

      .brand-logo .logo-img {
        width: 150px;
        height: auto;
        margin-top: 15px;
        display: block;
        margin: 0 auto;
      }

      .login-card h2 {
        font-size: 24px;
        margin-bottom: 24px;
        color: #1a202c; /* Đồng bộ màu text với trang chủ */
        font-weight: 700;
        text-align: center;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #718096; /* Đồng bộ màu xám với trang chủ */
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        -webkit-user-select: none;
        user-select: none;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px !important;
        font-weight: 600;
        outline: none;
        background-color: #f8fafc;
        color: #1a202c;
        transition: all 0.2s ease;
        appearance: none;
        -webkit-user-select: text;
        user-select: text;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background-color: #ffffff;
      }

      button,
      .btn-login {
        width: 100%;
        min-height: 52px;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        -webkit-user-select: none;
        user-select: none;
        background-color: #2563eb;
        margin-top: 10px;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      }

      button:active,
      .btn-login:active {
        opacity: 0.8;
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.7;
        pointer-events: none;
      }

      .login-alert {
        padding: 14px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
        background-color: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
        text-align: center;
      }

      .toggle-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #2563eb;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }

      .toggle-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="login-wrap">
        <div class="brand-logo">
          <img src="images/logo.webp" alt="Themis logo" class="logo-img" />
        </div>

        <div class="login-card">
          <h2 id="formTitle">Đăng nhập</h2>
          <div id="alertBox" class="login-alert"></div>

          <form id="loginForm">
            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP / EMAIL</label>
              <input type="text" id="username" required />
            </div>
            <div class="form-group">
              <label>MẬT KHẨU</label>
              <input type="password" id="password" required />
            </div>

            <div style="text-align: right; margin-bottom: 15px">
              <a
                href="resetpassword.html"
                style="
                  font-size: 14px;
                  color: #2563eb;
                  font-weight: 600;
                  text-decoration: none;
                "
                >Quên mật khẩu?</a
              >
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
              Đăng nhập
            </button>
            <span class="toggle-link" id="showRegisterLink"
              >Chưa có tài khoản? Đăng ký ngay</span
            >
          </form>

          <form id="registerForm" style="display: none">
            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP</label>
              <input type="text" id="reg_username" required />
            </div>
            <div class="form-group">
              <label>EMAIL</label>
              <input type="email" id="reg_email" required />
            </div>
            <div class="form-group">
              <label>HỌ VÀ TÊN</label>
              <input type="text" id="reg_HovaTen" required />
            </div>
            <div class="form-group">
              <label>SỐ ĐIỆN THOẠI</label>
              <input type="text" id="reg_SoDienThoai" required />
            </div>
            <div class="form-group">
              <label>MẬT KHẨU</label>
              <input type="password" id="reg_password" required />
            </div>
            <div class="form-group">
              <label>TÊN NGÂN HÀNG</label>
              <input type="text" id="reg_TenNganHang" required />
            </div>
            <div class="form-group">
              <label>SỐ TÀI KHOẢN</label>
              <input type="text" id="reg_SoTaiKhoan" required />
            </div>
            <button type="submit" class="btn-login" id="btnRegister">
              Đăng ký
            </button>
            <span class="toggle-link" id="showLoginLink"
              >Đã có tài khoản? Đăng nhập tại đây</span
            >
          </form>
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";

      // --- DOM Elements ---
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const formTitle = document.getElementById("formTitle");
      const alertBox = document.getElementById("alertBox");

      const showRegisterLink = document.getElementById("showRegisterLink");
      const showLoginLink = document.getElementById("showLoginLink");

      // --- Hàm Tiện Ích Thông Báo ---
      function showAlert(message, isSuccess = false) {
        alertBox.innerText = message;
        alertBox.style.display = "block";
        if (isSuccess) {
          alertBox.style.backgroundColor = "#dcfce7";
          alertBox.style.color = "#166534";
          alertBox.style.border = "1px solid #bbf7d0";
        } else {
          alertBox.style.backgroundColor = "#fef2f2";
          alertBox.style.color = "#991b1b";
          alertBox.style.border = "1px solid #fecaca";
        }
      }

      // --- Chuyển Đổi Màn Hình Đăng Nhập / Đăng Ký ---
      showRegisterLink.addEventListener("click", () => {
        loginForm.style.display = "none";
        registerForm.style.display = "block";
        formTitle.innerText = "Đăng ký tài khoản";
        alertBox.style.display = "none";
      });

      showLoginLink.addEventListener("click", () => {
        registerForm.style.display = "none";
        loginForm.style.display = "block";
        formTitle.innerText = "Đăng nhập";
        alertBox.style.display = "none";
      });

      // --- Xử lý Đăng Nhập ---
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnLogin");

        alertBox.style.display = "none";
        btn.disabled = true;
        btn.innerText = "Đang xác thực...";

        try {
          const res = await fetch(`${API_BASE_URL}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "69420",
            },
            credentials: "include",
            body: JSON.stringify({
              username: document.getElementById("username").value,
              password: document.getElementById("password").value,
            }),
          });

          const data = await res.json();

          if (data && data.status === "success") {
            window.location.href = "trangchu.html";
          } else {
            showAlert(data?.message || "Sai thông tin!");
            btn.disabled = false;
            btn.innerText = "Đăng nhập";
          }
        } catch (error) {
          showAlert("Lỗi kết nối máy chủ!");
          btn.disabled = false;
          btn.innerText = "Đăng nhập";
        }
      });

      // --- Xử lý Đăng Ký ---
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnRegister");

        alertBox.style.display = "none";
        btn.disabled = true;
        btn.innerText = "Đang xử lý...";

        const payload = {
          username: document.getElementById("reg_username").value,
          email: document.getElementById("reg_email").value,
          HovaTen: document.getElementById("reg_HovaTen").value,
          SoDienThoai: document.getElementById("reg_SoDienThoai").value,
          password: document.getElementById("reg_password").value,
          TenNganHang: document.getElementById("reg_TenNganHang").value,
          SoTaiKhoan: document.getElementById("reg_SoTaiKhoan").value,
        };

        try {
          const res = await fetch(`${API_BASE_URL}/register`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "69420",
            },
            body: JSON.stringify(payload),
          });

          const data = await res.json();

          if (data && data.status === "success") {
            // Hiển thị thông báo thành công và chuyển về màn login
            showAlert("Đăng ký thành công! Vui lòng đăng nhập.", true);
            registerForm.reset(); // Xoá trắng form
            setTimeout(() => {
              showLoginLink.click();
            }, 1500);
          } else {
            showAlert(data?.message || "Đăng ký không thành công!");
          }
        } catch (error) {
          showAlert("Lỗi kết nối máy chủ!");
        } finally {
          btn.disabled = false;
          btn.innerText = "Đăng ký";
        }
      });
    </script>
  </body>
</html>
