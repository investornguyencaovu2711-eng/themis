<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
    />
    <title>Đăng nhập</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        /* Thiết lập hình nền chìm và phủ thêm một lớp màu trắng mờ 75% */
        background:
          linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)),
          url("images/hinhnen.jpg") no-repeat center center fixed;
        background-size: cover; /* Đảm bảo hình nền phủ kín màn hình */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: none;
      }

      .phone-container {
        width: 100%;
        max-width: 412px;
        height: 100vh;
        height: 100dvh;
        max-height: 892px;
        /* Thay vì màu trắng đặc, dùng trắng hơi trong suốt để thấy nhẹ hình nền phía sau */
        background-color: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(
          10px
        ); /* Tạo hiệu ứng kính mờ cho form (iOS/Hiện đại) */
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        border-radius: 24px;
        position: relative;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
      }

      @media (max-width: 450px) {
        .phone-container {
          border-radius: 0;
          max-height: 100dvh;
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          background-color: rgba(
            255,
            255,
            255,
            0.85
          ); /* Tăng độ trong suốt trên mobile */
        }
      }

      .phone-container::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      .login-wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex: 1;
        padding: 40px 24px;
      }

      .brand-logo {
        text-align: center;
        margin-bottom: 40px;
      }
      .brand-logo .logo-img {
        width: 150px;
        height: auto;
        margin-top: 15px;
        display: block;
        margin: 0 auto;
      }

      .login-card h2 {
        font-size: 24px;
        margin-bottom: 24px;
        color: #1e293b;
        font-weight: 700;
      }

      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        -webkit-user-select: none;
        user-select: none;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 16px !important; /* Ngăn iOS tự động zoom */
        font-weight: 600;
        outline: none;
        background-color: #ffffff;
        transition: all 0.2s ease;
        appearance: none;
        -webkit-user-select: text;
        user-select: text;
      }
      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background-color: #fff;
      }

      button,
      .btn-login {
        width: 100%;
        min-height: 52px;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        -webkit-user-select: none;
        user-select: none;
        background-color: #2563eb;
      }
      button:active,
      .btn-login:active {
        opacity: 0.8;
        transform: scale(0.98);
      }
      button:disabled {
        opacity: 0.7;
        pointer-events: none;
      }

      .login-alert {
        padding: 14px;
        border-radius: 12px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
        background-color: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
    </style>
  </head>
  <body>
    <div class="phone-container">
      <div class="login-wrap">
        <div class="brand-logo">
          <img src="images/logo.webp" alt="Themis logo" class="logo-img" />
        </div>

        <div class="login-card">
          <h2>Đăng nhập</h2>
          <div id="loginAlert" class="login-alert"></div>
          <form id="loginForm">
            <div class="form-group">
              <label>TÊN ĐĂNG NHẬP / EMAIL</label>
              <input type="text" id="username" required value="" />
            </div>
            <div class="form-group">
              <label>MẬT KHẨU</label>
              <input type="password" id="password" required value="" />
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
              Đăng nhập
            </button>
          </form>
        </div>
      </div>
    </div>
    <script>
      const API_BASE_URL = "https://quintet-rickety-scuba.ngrok-free.dev";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const alertBox = document.getElementById("loginAlert");
          const btn = document.getElementById("btnLogin");

          alertBox.style.display = "none";
          alertBox.innerText = "";
          btn.disabled = true;
          btn.innerText = "Đang xác thực...";

          try {
            const res = await fetch(`${API_BASE_URL}/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "69420",
              },
              credentials: "include",
              body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value,
              }),
            });

            const data = await res.json();

            if (data && data.status === "success") {
              window.location.href = "trangchu.html";
            } else {
              alertBox.innerText = data?.message || "Sai thông tin!";
              alertBox.style.display = "block";
              btn.disabled = false;
              btn.innerText = "Đang nhập";
            }
          } catch (error) {
            alertBox.innerText = "Lỗi kết nối máy chủ!";
            alertBox.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Đăng nhập";
          }
        });
    </script>
  </body>
</html>
